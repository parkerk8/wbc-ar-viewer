<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
      html, body { margin:0; height:100%; background:#111; }
      model-viewer { width:100%; height:100%; touch-action:none; }
    </style>
  </head>
  <body>
    <model-viewer
      src="./neutrophil.glb"
      ar
      ar-modes="webxr"
      ar-placement="floor"
      ar-scale="auto"
      camera-controls
      interaction-prompt="auto"
    >
      <button slot="ar-button" style="position:absolute;left:50%;transform:translateX(-50%);bottom:20px;">
        AR
      </button>
    </model-viewer>
  </body>
</html>
