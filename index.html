<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>AR Model Viewer</title>

    <!-- Pin model-viewer (do NOT use unversioned "latest") -->
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"
    ></script>

    <style>
      :not(:defined) > * { display: none; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        touch-action: none; /* important: prevent page gestures */
      }

      model-viewer {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #111;
        display: none;
        touch-action: none; /* important: allow model-viewer to own gestures */
      }

      /* Landing */
      #landing {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: #0e0f12;
        color: #fff;
        z-index: 10;
      }
      #landing .card {
        width: min(720px, 100%);
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.55);
        border-radius: 18px;
        padding: 18px;
      }
      #landing h1 { margin: 0 0 8px; font-size: 20px; }
      #landing p { margin: 0 0 14px; opacity: .85; font-size: 14px; }
      #landing .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 540px) { #landing .grid { grid-template-columns: 1fr; } }

      .pick {
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        border-radius: 14px;
        padding: 14px;
        color: #fff;
        text-align: left;
        font-weight: 700;
      }

      /* Topbar - hidden in AR so it cannot steal gestures */
      #topbar {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        display: none;
        align-items: center;
        gap: 10px;
        z-index: 20;
        pointer-events: none;
      }
      #model-menu {
        pointer-events: auto;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(0,0,0,0.65);
        border: 1px solid rgba(255,255,255,0.12);
      }
      .model-btn {
        cursor: pointer;
        color: #fff;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        background: transparent;
        opacity: 0.9;
      }
      .model-btn.active {
        border-color: rgba(66,133,244,0.9);
        box-shadow: 0 0 0 2px rgba(66,133,244,0.15) inset;
        opacity: 1;
      }

      /* Hide any overlay UI while in AR to guarantee gestures work */
      model-viewer[ar-status="session-started"] ~ #topbar { display: none !important; }

      /* Simple hotspot styling (no tuner) */
      .hotspot {
        border: none;
        padding: 0;
        background: none;
        cursor: pointer;
        position: relative;
        transform: translate(-50%, -50%);
      }
      .hotspot-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #4caf50;
        box-shadow: 0 0 8px rgba(76,175,80,.8);
      }
    </style>
  </head>

  <body>
    <div id="landing">
      <div class="card">
        <h1>Select a cell type</h1>
        <p>Choose a model to open the viewer.</p>
        <div class="grid" id="landing-grid"></div>
      </div>
    </div>

    <model-viewer
      id="cellViewer"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto"
      ar-placement="floor"
      camera-controls
      interaction-prompt="none"
      touch-action="none"
      shadow-intensity="1"
    >
      <button slot="ar-button" style="
        position: fixed; left: 50%; transform: translateX(-50%);
        bottom: 20px; z-index: 9999;
        background:#fff; color:#4285f4;
        border:1px solid #dadce0; border-radius: 24px;
        padding:0 26px; height:48px; line-height:48px; min-width:220px;
        font: 500 16px system-ui;
      ">
        View in your space
      </button>

      <!-- Keep hotspots if you want; they won't affect AR gestures now -->
      <button id="hotspot-nucleus" slot="hotspot-nucleus" class="hotspot"
        data-position="-1.300 2.000 -2.200" data-normal="0 1 0">
        <div class="hotspot-dot"></div>
      </button>
    </model-viewer>

    <div id="topbar">
      <div id="model-menu"></div>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const viewer = document.getElementById("cellViewer");
        const landing = document.getElementById("landing");
        const landingGrid = document.getElementById("landing-grid");
        const topbar = document.getElementById("topbar");
        const modelMenu = document.getElementById("model-menu");

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        const MODELS = [
          { key: "neutrophil",  label: "Neutrophil",  glb: "./neutrophil.glb",  usdz: "./neutrophil.usdz" },
          { key: "basophil",    label: "Basophil",    glb: "./basophil.glb",    usdz: "./basophil.usdz" },
          { key: "eosinophil",  label: "Eosinophil",  glb: "./eosinophil.glb",  usdz: "./eosinophil.usdz" },
          { key: "monocyte",    label: "Monocyte",    glb: "./monocyte.glb",    usdz: "./monocyte.usdz" },
          { key: "lymphocyte",  label: "Lymphocyte",  glb: "./lymphocyte.glb",  usdz: "./lymphocyte.usdz" },
        ];

        let activeKey = null;

        function renderModelMenu() {
          modelMenu.innerHTML = MODELS.map(m => {
            const cls = m.key === activeKey ? "model-btn active" : "model-btn";
            return `<button class="${cls}" type="button" data-model="${m.key}">${m.label}</button>`;
          }).join("");

          modelMenu.querySelectorAll("button[data-model]").forEach(btn => {
            btn.addEventListener("click", () => selectModel(btn.getAttribute("data-model")));
          });
        }

        function selectModel(key) {
          const m = MODELS.find(x => x.key === key);
          if (!m) return;

          activeKey = key;

          landing.style.display = "none";
          viewer.style.display = "block";
          topbar.style.display = "flex";
          renderModelMenu();

          // Force clean reload
          viewer.removeAttribute("src");
          viewer.removeAttribute("ios-src");

          requestAnimationFrame(() => {
            viewer.setAttribute("src", m.glb);
            if (isIOS) viewer.setAttribute("ios-src", m.usdz);
          });
        }

        function buildLanding() {
          landingGrid.innerHTML = MODELS.map(m => `
            <button class="pick" type="button" data-model="${m.key}">${m.label}</button>
          `).join("");

          landingGrid.querySelectorAll("button[data-model]").forEach(btn => {
            btn.addEventListener("click", () => selectModel(btn.getAttribute("data-model")));
          });
        }

        // Hide topbar while in AR to prevent gesture stealing
        viewer.addEventListener("ar-status", () => {
          const status = viewer.getAttribute("ar-status");
          if (status === "session-started") topbar.style.display = "none";
          if (status === "not-presenting" && activeKey) topbar.style.display = "flex";
        });

        buildLanding();
      });
    </script>
  </body>
</html>
