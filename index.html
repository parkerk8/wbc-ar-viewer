<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AR Model Viewer (WebXR-only Debug)</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>

    <style>
      :not(:defined) > * { display: none; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
      }

      model-viewer {
        inset: 0;
        width: 100vw;
        height: 100dvh;
        background: #111;
        display: none;
      }

      /* ===== Landing ===== */
      #landing {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: radial-gradient(1200px 800px at 50% 20%, rgba(66,133,244,0.20), rgba(0,0,0,0.0) 60%),
                    radial-gradient(900px 600px at 20% 80%, rgba(76,175,80,0.16), rgba(0,0,0,0.0) 55%),
                    #0e0f12;
        color: #fff;
        z-index: 10010;
      }

      #landing .card {
        width: min(720px, 100%);
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(10px);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      }

      #landing h1 { margin: 0 0 8px; font-size: 20px; font-weight: 700; }
      #landing p { margin: 0 0 14px; opacity: 0.85; line-height: 1.45; font-size: 14px; }

      #landing .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 540px) { #landing .grid { grid-template-columns: 1fr; } }

      .pick {
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        border-radius: 14px;
        padding: 14px 14px;
        color: #fff;
        text-align: left;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
        font-weight: 700;
      }
      .pick:hover {
        transform: translateY(-1px);
        border-color: rgba(66,133,244,0.55);
        background: rgba(66,133,244,0.10);
      }

      /* ===== Topbar controls ===== */
      #topbar {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 10px);
        left: 10px;
        right: 10px;
        z-index: 10011;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
      }

      #model-menu {
        pointer-events: auto;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(0,0,0,0.65);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(6px);
      }

      .model-btn {
        cursor: pointer;
        color: #fff;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        background: transparent;
        opacity: 0.9;
      }
      .model-btn.active {
        border-color: rgba(66,133,244,0.9);
        box-shadow: 0 0 0 2px rgba(66,133,244,0.15) inset;
        opacity: 1;
      }

      #tuner-toggle {
        pointer-events: auto;
        cursor: pointer;
        color: #fff;
        background: rgba(0,0,0,0.65);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
      }

      /* ===== Error banner ===== */
      #errorbox {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(env(safe-area-inset-bottom) + 10px);
        z-index: 10012;
        display: none;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(120, 20, 20, 0.78);
        border: 1px solid rgba(255,255,255,0.18);
        color: #fff;
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
      }

      /* ===== AR button ===== */
      #ar-button {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom) + 20px);
        z-index: 10;

        background-color: #fff;
        padding: 0 26px;
        min-width: 220px;
        height: 48px;
        line-height: 48px;

        font-size: 16px;
        font-weight: 600;
        color: #4285f4;

        border-radius: 24px;
        border: 1px solid #dadce0;
        white-space: nowrap;
      }

      /* ========================
         HOTSPOTS
         ======================== */
      .hotspot {
        border: none;
        padding: 0;
        background: none;
        cursor: pointer;
        position: relative;
        --hotspot-scale: 1;
        transform: translate(-50%, -50%) scale(var(--hotspot-scale));
      }

      .hotspot-anchor-dot {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.8);
      }

      .hotspot-line {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 2px;
        height: 40px;
        background: #4caf50;
        transform: translate(-50%, -100%);
        opacity: 0.8;
      }

      .hotspot-label {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, calc(-100% - 48px));
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-size: 16px;
        line-height: 1.3;
        white-space: nowrap;
      }

      .hotspot-description {
        display: none;
        margin-left: 4px;
        font-size: 13px;
        opacity: 0.9;
      }
      .hotspot:hover .hotspot-description { display: inline; }

      /* AR MODE: smaller hotspots + hide descriptions */
      model-viewer[ar-status="session-started"] .hotspot { --hotspot-scale: 0.65; }
      model-viewer[ar-status="session-started"] .hotspot-label { padding: 6px 9px; font-size: 12px; }
      model-viewer[ar-status="session-started"] .hotspot-anchor-dot { width: 8px; height: 8px; }
      model-viewer[ar-status="session-started"] .hotspot-line { height: 30px; }
      model-viewer[ar-status="session-started"] .hotspot-description { display: none !important; }

      /* CRITICAL: in AR, never let hotspots intercept gestures */
      model-viewer[ar-status="session-started"] .hotspot,
      model-viewer[ar-status="session-started"] .hotspot * {
        pointer-events: none !important;
      }

      /* ===== Capability panel (visible in 3D mode) ===== */
      #capPanel {
        position: fixed;
        left: 10px;
        bottom: 10px;
        z-index: 10050;
        max-width: calc(100vw - 20px);
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(0,0,0,0.78);
        border: 1px solid rgba(255,255,255,0.16);
        color: #fff;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
      }
      #capPanel.bad {
        background: rgba(120, 20, 20, 0.82);
        border-color: rgba(255,255,255,0.22);
      }
      #capPanel.hidden { display: none; }
    </style>
  </head>

  <body>
    <div id="landing">
      <div class="card">
        <h1>Select a cell type</h1>
        <p>WebXR-only AR is enabled in this build.</p>
        <div class="grid" id="landing-grid"></div>
      </div>
    </div>

    <div id="topbar">
      <div id="model-menu"></div>
      <button id="tuner-toggle" type="button">Tuner</button>
    </div>

    <!-- WebXR ONLY (no Scene Viewer / Quick Look) -->
    <model-viewer
      id="cellViewer"
      ar
      ar-modes="webxr"
      ar-placement="floor"
      ar-scale="fixed"
      camera-controls
      interaction-prompt="none"
      shadow-intensity="1"
    >
      <button slot="ar-button" id="ar-button">View in your space</button>

      <!-- Hotspots -->
      <button id="hotspot-nucleus" slot="hotspot-nucleus" class="hotspot"
        data-position="-1.300 2.000 -2.200" data-normal="0.973 -0.164 0.164">
        <div class="hotspot-anchor-dot"></div><div class="hotspot-line"></div>
        <div class="hotspot-label">Nucleus <span class="hotspot-description">Contains genetic material and controls cell activities.</span></div>
      </button>

      <button id="hotspot-golgi" slot="hotspot-golgi" class="hotspot"
        data-position="0.900 0.600 -0.100" data-normal="1.000 0.600 -0.700">
        <div class="hotspot-anchor-dot"></div><div class="hotspot-line"></div>
        <div class="hotspot-label">Golgi Complex <span class="hotspot-description">Packages and modifies proteins and lipids.</span></div>
      </button>

      <button id="hotspot-mito" slot="hotspot-mito" class="hotspot"
        data-position="3.600 0.200 -3.600" data-normal="-0.842 -0.507 -0.181">
        <div class="hotspot-anchor-dot"></div><div class="hotspot-line"></div>
        <div class="hotspot-label">Mitochondrion <span class="hotspot-description">Produces energy (ATP) for the cell.</span></div>
      </button>

      <button id="hotspot-ribosome" slot="hotspot-ribosome" class="hotspot"
        data-position="2.300 -0.200 -4.300" data-normal="-0.507 -0.181 0.842">
        <div class="hotspot-anchor-dot"></div><div class="hotspot-line"></div>
        <div class="hotspot-label">Ribosome <span class="hotspot-description">Site of protein synthesis.</span></div>
      </button>

      <button id="hotspot-granules" slot="hotspot-granules" class="hotspot"
        data-position="-2.900 -1.600 5.800" data-normal="0.521 0.181 -0.834">
        <div class="hotspot-anchor-dot"></div><div class="hotspot-line"></div>
        <div class="hotspot-label">Granules <span class="hotspot-description">Stored enzymes or molecules.</span></div>
      </button>
    </model-viewer>

    <div id="errorbox"></div>
    <div id="capPanel"></div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const viewer = document.getElementById("cellViewer");
        const landing = document.getElementById("landing");
        const landingGrid = document.getElementById("landing-grid");
        const topbar = document.getElementById("topbar");
        const modelMenu = document.getElementById("model-menu");
        const errorbox = document.getElementById("errorbox");
        const capPanel = document.getElementById("capPanel");
        const tunerToggle = document.getElementById("tuner-toggle");

        // keep tuner button (you can wire it back later)
        tunerToggle.addEventListener("click", () => {
          // placeholder
        });

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const ua = navigator.userAgent;

        const MODELS = [
          { key: "neutrophil",  label: "Neutrophil",  glb: "./neutrophil.glb",  usdz: "./neutrophil.usdz" },
          { key: "basophil",    label: "Basophil",    glb: "./basophil.glb",    usdz: "./basophil.usdz" },
          { key: "eosinophil",  label: "Eosinophil",  glb: "./eosinophil.glb",  usdz: "./eosinophil.usdz" },
          { key: "monocyte",    label: "Monocyte",    glb: "./monocyte.glb",    usdz: "./monocyte.usdz" },
          { key: "lymphocyte",  label: "Lymphocyte",  glb: "./lymphocyte.glb",  usdz: "./lymphocyte.usdz" },
        ];

        let activeKey = null;

        function setError(msg) {
          if (!msg) { errorbox.style.display = "none"; errorbox.textContent = ""; return; }
          errorbox.style.display = "block";
          errorbox.textContent = msg;
        }

        function renderModelMenu() {
          modelMenu.innerHTML = MODELS.map(m => {
            const cls = m.key === activeKey ? "model-btn active" : "model-btn";
            return `<button class="${cls}" type="button" data-model="${m.key}">${m.label}</button>`;
          }).join("");

          modelMenu.querySelectorAll("button[data-model]").forEach(btn => {
            btn.addEventListener("click", () => selectModel(btn.getAttribute("data-model")));
          });
        }

        function selectModel(key) {
          const m = MODELS.find(x => x.key === key);
          if (!m) return;

          setError(null);
          activeKey = key;

          landing.style.display = "none";
          viewer.style.display = "block";
          topbar.style.display = "flex";
          renderModelMenu();

          viewer.removeAttribute("src");
          viewer.removeAttribute("ios-src");

          requestAnimationFrame(() => {
            viewer.setAttribute("src", m.glb);
            // even though we force WebXR-only, keep ios-src in case you flip back later
            if (isIOS) viewer.setAttribute("ios-src", m.usdz);
          });
        }

        function buildLanding() {
          landingGrid.innerHTML = MODELS.map(m => `
            <button class="pick" type="button" data-model="${m.key}">${m.label}</button>
          `).join("");

          landingGrid.querySelectorAll("button[data-model]").forEach(btn => {
            btn.addEventListener("click", () => selectModel(btn.getAttribute("data-model")));
          });
        }

        // Capability panel (works in 3D mode)
        function updateCapPanel(extra = "") {
          const arStatus = viewer.getAttribute("ar-status") || "(none)";
          const canActivateAR = !!viewer.canActivateAR;
          const isSecure = window.isSecureContext;
          const https = location.protocol === "https:";

          let msg =
`secureContext: ${isSecure}
protocol: ${location.protocol}
canActivateAR: ${canActivateAR}
ar-status: ${arStatus}
ar-modes: ${viewer.getAttribute("ar-modes")}
iOS: ${isIOS}
UA: ${ua.slice(0, 80)}${ua.length > 80 ? "…" : ""}`;

          if (extra) msg += `\n${extra}`;

          capPanel.textContent = msg;

          // If WebXR can't activate, show it loud
          const bad = (!https || !isSecure || !canActivateAR);
          capPanel.classList.toggle("bad", bad);

          if (bad) {
            capPanel.classList.remove("hidden");
          }
        }

        // AR status changes
        viewer.addEventListener("ar-status", () => {
          const status = viewer.getAttribute("ar-status");
          const inAR = status === "session-started";

          // DOM overlays may disappear in AR on some devices/browsers;
          // keep panel visible when possible, hide if you prefer.
          // (Leaving visible helps if the browser supports WebXR DOM overlay.)
          updateCapPanel("ar-status event fired");

          // Hide top UI while in AR to avoid stealing gestures
          topbar.style.display = inAR ? "none" : (activeKey ? "flex" : "none");
        });

        // Initial
        buildLanding();
        topbar.style.display = "none";
        viewer.style.display = "none";
        updateCapPanel("ready");

        // Refresh cap panel periodically while in 3D mode
        setInterval(() => updateCapPanel(""), 500);
      });
    </script>
  </body>
</html>
