<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AR Model Viewer with Hotspots</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
:not(:defined) > * { display: none; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: system-ui;
  background: #111;
}

model-viewer {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100dvh;
  background: #111;
  display: none;
}

/* Landing */
#landing {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  background: #0e0f12;
  color: #fff;
  z-index: 10010;
}

.card {
  width: 420px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.pick {
  padding: 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  color: white;
}

/* Topbar */
#topbar {
  position: fixed;
  top: 10px;
  left: 10px;
  right: 10px;
  display: none;
  justify-content: space-between;
  z-index: 10011;
}

#model-menu {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  background: rgba(0,0,0,0.6);
  padding: 8px;
  border-radius: 12px;
}

.model-btn {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid #555;
  color: white;
  cursor: pointer;
}

.model-btn.active {
  border-color: #4285f4;
}

/* ===== TUNER (RESTORED) ===== */
#tuner-toggle {
  pointer-events: auto;
  cursor: pointer;
  color: #fff;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 13px;
}

/* Tuner panel */
#hotspot-controls {
  position: fixed;
  right: 0;
  bottom: 0;
  width: 320px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 12px;
  background: rgba(0,0,0,0.9);
  color: #fff;
  font-size: 12px;
  z-index: 10000;
  display: none;
}

#hotspot-controls.is-open {
  display: block;
}

.hotspot-section {
  margin-bottom: 10px;
}

/* Hotspots */
.hotspot {
  position: relative;
}

.hotspot-label {
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 6px 10px;
  border-radius: 999px;
}

/* AR rotate */
#ar-rotate-bar {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 12px;
}

model-viewer[ar-status="session-started"] ~ #ar-rotate-bar {
  display: flex;
}
</style>
</head>

<body>

<div id="landing">
  <div class="card">
    <h2>Select a cell</h2>
    <div class="grid" id="landing-grid"></div>
  </div>
</div>

<div id="topbar">
  <div id="model-menu"></div>
  <button id="tuner-toggle">Tuner</button>
</div>

<model-viewer id="viewer"
  ar
  camera-controls
  disable-pan
  touch-action="none"
  camera-orbit="0deg 70deg 105%"
  min-camera-orbit="auto auto 80%"
  max-camera-orbit="auto auto 140%"
>

<button slot="ar-button">View in AR</button>

<!-- Example hotspot -->
<button id="hotspot-nucleus" slot="hotspot-nucleus" class="hotspot" data-position="0 0 0">
  <div class="hotspot-label">Nucleus</div>
</button>

</model-viewer>

<div id="hotspot-controls"></div>

<div id="ar-rotate-bar">
  <input id="ar-rotate" type="range" min="-180" max="180">
</div>

<script>
const viewer = document.getElementById("viewer");
const landing = document.getElementById("landing");
const landingGrid = document.getElementById("landing-grid");
const modelMenu = document.getElementById("model-menu");
const topbar = document.getElementById("topbar");
const tuner = document.getElementById("hotspot-controls");
const tunerToggle = document.getElementById("tuner-toggle");

const PHILS = [
  {key:"neutrophil",label:"Neutrophil"},
  {key:"basophil",label:"Basophil"},
  {key:"eosinophil",label:"Eosinophil"},
];

const CYTES = [
  {key:"monocyte",label:"Monocyte"},
  {key:"lymphocyte",label:"Lymphocyte"},
];

const DEFAULT = [{key:"default",label:"Default"}];

const MODELS = [...DEFAULT,...PHILS,...CYTES];

let active = null;

/* URL deep link */
function getQueryModel(){
  return new URL(location.href).searchParams.get("model");
}

function setQueryModel(k){
  const url = new URL(location.href);
  url.searchParams.set("model",k);
  history.replaceState(null,"",url);
}

/* Landing */
function buildLanding(){
  landingGrid.innerHTML = MODELS.map(m=>`
    <button class="pick" data-model="${m.key}">${m.label}</button>
  `).join("");

  landingGrid.querySelectorAll("button").forEach(btn=>{
    btn.onclick = ()=>selectModel(btn.dataset.model);
  });
}

/* Menu */
function renderMenu(){
  const build = (arr)=>arr.map(m=>{
    const activeClass = m.key===active?"active":"";
    return `<button class="model-btn ${activeClass}" data-model="${m.key}">${m.label}</button>`;
  }).join("");

  modelMenu.innerHTML = `
    <div>${build(DEFAULT)}</div>
    <div>${build(PHILS)}</div>
    <div>${build(CYTES)}</div>
  `;

  modelMenu.querySelectorAll("button").forEach(btn=>{
    btn.onclick=()=>selectModel(btn.dataset.model);
  });
}

/* Select model */
function selectModel(key){
  active = key;
  setQueryModel(key);

  landing.style.display="none";
  viewer.style.display="block";
  topbar.style.display="flex";

  renderMenu();

  viewer.src = `./${key}.glb`;
}

/* Tuner toggle */
tunerToggle.onclick = ()=>{
  tuner.classList.toggle("is-open");
};

/* AR rotation */
document.getElementById("ar-rotate").oninput = e=>{
  viewer.orientation = `0deg ${e.target.value}deg 0deg`;
};

/* Init */
buildLanding();

const start = getQueryModel() || "default";
selectModel(start);

</script>

</body>
</html>
