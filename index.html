<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <title>WebXR AR Minimal Multi-Model Test</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>

    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #111;
        touch-action: none;
        overscroll-behavior: none;
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
        background: #111;
        touch-action: none;
      }

      /* Tiny UI */
      #ui {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 10px);
        left: 10px;
        z-index: 9999;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(8px);
      }

      #ui select, #ui button {
        font-size: 14px;
        color: #fff;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.14);
        border-radius: 10px;
        padding: 8px 10px;
      }

      /* Make sure UI can't block gestures if it overlaps */
      #ui { pointer-events: auto; }
      #ui.hidden { display: none; }

      /* Raise the AR button */
      #ar-button {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom) + 18px);
        z-index: 200000;
        padding: 0 22px;
        height: 46px;
        line-height: 46px;
        border-radius: 999px;
        border: 1px solid #dadce0;
        background: #fff;
        color: #4285f4;
        font-weight: 700;
        white-space: nowrap;
      }
    </style>
  </head>

  <body>
    <div id="ui">
      <select id="modelSelect"></select>
      <button id="reloadBtn" type="button">Reload</button>
    </div>

    <model-viewer
      id="mv"
      ar
      ar-modes="webxr"
      ar-placement="floor"
      ar-scale="auto"
      touch-action="none"
      interaction-prompt="none"
      shadow-intensity="1"
    >
      <button id="ar-button" slot="ar-button">View in your space</button>
    </model-viewer>

    <script>
      const mv = document.getElementById("mv");
      const ui = document.getElementById("ui");
      const select = document.getElementById("modelSelect");
      const reloadBtn = document.getElementById("reloadBtn");

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

      const MODELS = [
        { key: "neutrophil",  label: "Neutrophil",  glb: "./neutrophil.glb",  usdz: "./neutrophil.usdz" },
        { key: "basophil",    label: "Basophil",    glb: "./basophil.glb",    usdz: "./basophil.usdz" },
        { key: "eosinophil",  label: "Eosinophil",  glb: "./eosinophil.glb",  usdz: "./eosinophil.usdz" },
        { key: "monocyte",    label: "Monocyte",    glb: "./monocyte.glb",    usdz: "./monocyte.usdz" },
        { key: "lymphocyte",  label: "Lymphocyte",  glb: "./lymphocyte.glb",  usdz: "./lymphocyte.usdz" },
      ];

      // populate select
      select.innerHTML = MODELS.map(m => `<option value="${m.key}">${m.label}</option>`).join("");

      function setModel(key) {
        const m = MODELS.find(x => x.key === key) || MODELS[0];

        // swap model
        mv.removeAttribute("src");
        mv.removeAttribute("ios-src");

        requestAnimationFrame(() => {
          mv.setAttribute("src", m.glb);
          if (isIOS) mv.setAttribute("ios-src", m.usdz);
        });
      }

      select.addEventListener("change", () => setModel(select.value));
      reloadBtn.addEventListener("click", () => setModel(select.value));

      // Hide UI while AR is running
      mv.addEventListener("ar-status", () => {
        const inAR = mv.getAttribute("ar-status") === "session-started";
        ui.classList.toggle("hidden", inAR);
      });

      // initial model
      setModel(MODELS[0].key);
    </script>
  </body>
</html>
