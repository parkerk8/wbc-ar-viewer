<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>3D Hotspots + Scene Viewer AR (AR-only scale)</title>

    <script type="module" src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>

    <style>
      :not(:defined) > * { display: none; }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
      }

      /* ===== Landing ===== */
      #landing {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: radial-gradient(1200px 800px at 50% 20%, rgba(66,133,244,0.20), rgba(0,0,0,0.0) 60%),
                    radial-gradient(900px 600px at 20% 80%, rgba(76,175,80,0.16), rgba(0,0,0,0.0) 55%),
                    #0e0f12;
        color: #fff;
        z-index: 10010;
      }

      #landing .card {
        width: min(720px, 100%);
        border: 1px solid rgba(255,255,255,0.10);
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(10px);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
      }

      #landing h1 { margin: 0 0 8px; font-size: 20px; font-weight: 700; }
      #landing p  { margin: 0 0 14px; opacity: 0.85; line-height: 1.45; font-size: 14px; }

      #landing .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 540px) { #landing .grid { grid-template-columns: 1fr; } }

      .pick {
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.04);
        border-radius: 14px;
        padding: 14px 14px;
        color: #fff;
        text-align: left;
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
        font-weight: 700;
      }
      .pick:hover {
        transform: translateY(-1px);
        border-color: rgba(66,133,244,0.55);
        background: rgba(66,133,244,0.10);
      }

      /* ===== Topbar controls ===== */
      #topbar {
        position: fixed;
        top: calc(env(safe-area-inset-top) + 10px);
        left: 10px;
        right: 10px;
        z-index: 10011;
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
      }

      #model-menu {
        pointer-events: auto;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(0,0,0,0.65);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(6px);
      }

      .model-btn {
        cursor: pointer;
        color: #fff;
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.12);
        background: transparent;
        opacity: 0.9;
      }
      .model-btn.active {
        border-color: rgba(66,133,244,0.9);
        box-shadow: 0 0 0 2px rgba(66,133,244,0.15) inset;
        opacity: 1;
      }

      /* ===== 3D viewer (visible) ===== */
      #viewer3d {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        background: #111;
        display: none;
        touch-action: manipulation;
      }

      /* ===== AR launcher (hidden but present) ===== */
      #viewerAR {
        position: fixed;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
        left: -9999px;
        top: -9999px;
      }

      /* ===== Error banner ===== */
      #errorbox {
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: calc(env(safe-area-inset-bottom) + 10px);
        z-index: 10012;
        display: none;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(120, 20, 20, 0.78);
        border: 1px solid rgba(255,255,255,0.18);
        color: #fff;
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
      }

      /* ===== AR button (external) ===== */
      #enter-ar {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(env(safe-area-inset-bottom) + 18px);
        z-index: 10020;

        background-color: #fff;
        padding: 0 26px;
        min-width: 220px;
        height: 48px;
        line-height: 48px;

        font-size: 16px;
        font-weight: 700;
        color: #4285f4;

        border-radius: 24px;
        border: 1px solid #dadce0;
        white-space: nowrap;
        display: none;
      }

      /* ========================
         HOTSPOTS (3D only)
         ======================== */
      .hotspot {
        border: none;
        padding: 0;
        background: none;
        cursor: pointer;
        position: relative;
        --hotspot-scale: 1;
        transform: translate(-50%, -50%) scale(var(--hotspot-scale));
      }

      .hotspot-anchor-dot {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #4caf50;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.8);
      }

      .hotspot-line {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 2px;
        height: 40px;
        background: #4caf50;
        transform: translate(-50%, -100%);
        opacity: 0.8;
      }

      .hotspot-label {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, calc(-100% - 48px));
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-size: 16px;
        line-height: 1.3;
        white-space: nowrap;
      }

      .hotspot-description {
        display: none;
        margin-left: 4px;
        font-size: 13px;
        opacity: 0.9;
      }
      .hotspot:hover .hotspot-description { display: inline; }
    </style>
  </head>

  <body>
    <div id="landing">
      <div class="card">
        <h1>Select a cell type</h1>
        <p>3D view keeps hotspots. AR launches via Scene Viewer with AR-only scaling.</p>
        <div class="grid" id="landing-grid"></div>
      </div>
    </div>

    <div id="topbar">
      <div id="model-menu"></div>
      <div style="pointer-events:auto; color:#fff; opacity:.8; font-size:12px;"></div>
    </div>

    <!-- 3D viewer (hotspots live here) -->
    <model-viewer
      id="viewer3d"
      camera-controls
      interaction-prompt="none"
      shadow-intensity="1"
    >
      <!-- Nucleus -->
      <button id="hotspot-nucleus" slot="hotspot-nucleus" class="hotspot"
        data-position="-1.300 2.000 -2.200" data-normal="0.973 -0.164 0.164">
        <div class="hotspot-anchor-dot"></div>
        <div class="hotspot-line"></div>
        <div class="hotspot-label">
          Nucleus
          <span class="hotspot-description">Contains genetic material and controls cell activities.</span>
        </div>
      </button>

      <!-- Golgi -->
      <button id="hotspot-golgi" slot="hotspot-golgi" class="hotspot"
        data-position="0.900 0.600 -0.100" data-normal="1.000 0.600 -0.700">
        <div class="hotspot-anchor-dot"></div>
        <div class="hotspot-line"></div>
        <div class="hotspot-label">
          Golgi Complex
          <span class="hotspot-description">Packages and modifies proteins and lipids.</span>
        </div>
      </button>

      <!-- Mito -->
      <button id="hotspot-mito" slot="hotspot-mito" class="hotspot"
        data-position="3.600 0.200 -3.600" data-normal="-0.842 -0.507 -0.181">
        <div class="hotspot-anchor-dot"></div>
        <div class="hotspot-line"></div>
        <div class="hotspot-label">
          Mitochondrion
          <span class="hotspot-description">Produces energy (ATP) for the cell.</span>
        </div>
      </button>

      <!-- Ribosome -->
      <button id="hotspot-ribosome" slot="hotspot-ribosome" class="hotspot"
        data-position="2.300 -0.200 -4.300" data-normal="-0.507 -0.181 0.842">
        <div class="hotspot-anchor-dot"></div>
        <div class="hotspot-line"></div>
        <div class="hotspot-label">
          Ribosome
          <span class="hotspot-description">Site of protein synthesis.</span>
        </div>
      </button>

      <!-- Granules -->
      <button id="hotspot-granules" slot="hotspot-granules" class="hotspot"
        data-position="-2.900 -1.600 5.800" data-normal="0.521 0.181 -0.834">
        <div class="hotspot-anchor-dot"></div>
        <div class="hotspot-line"></div>
        <div class="hotspot-label">
          Granules
          <span class="hotspot-description">Stored enzymes or molecules.</span>
        </div>
      </button>
    </model-viewer>

    <!-- Hidden AR launcher. No hotspots. -->
    <model-viewer
      id="viewerAR"
      ar
      ar-modes="scene-viewer"
      ar-placement="floor"
      ar-scale="auto"
      interaction-prompt="none"
    ></model-viewer>

    <button id="enter-ar" type="button">View in your space</button>

    <div id="errorbox"></div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const viewer3d = document.getElementById("viewer3d");
        const viewerAR = document.getElementById("viewerAR");
        const landing = document.getElementById("landing");
        const landingGrid = document.getElementById("landing-grid");
        const topbar = document.getElementById("topbar");
        const modelMenu = document.getElementById("model-menu");
        const enterAR = document.getElementById("enter-ar");
        const errorbox = document.getElementById("errorbox");

        // Set this to 0.05 for 5% (you asked for 5%).
        // If Scene Viewer ignores runtime scale on your device/version, you must use *_ar.glb files below.
        const AR_SCALE = 0.05;

        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        // IMPORTANT:
        // - glb3d is the "normal" model for your hotspot view.
        // - glbAR is OPTIONAL but recommended: a pre-scaled model for Scene Viewer.
        //   If you don't have *_ar.glb files yet, leave glbAR null to reuse glb3d.
        const MODELS = [
          { key: "neutrophil", label: "Neutrophil", glb3d: "./neutrophil.glb",  glbAR: "./neutrophil_ar.glb",  usdz: "./neutrophil.usdz" },
          { key: "basophil",   label: "Basophil",   glb3d: "./basophil.glb",    glbAR: "./basophil_ar.glb",    usdz: "./basophil.usdz" },
          { key: "eosinophil", label: "Eosinophil", glb3d: "./eosinophil.glb",  glbAR: "./eosinophil_ar.glb",  usdz: "./eosinophil.usdz" },
          { key: "monocyte",   label: "Monocyte",   glb3d: "./monocyte.glb",    glbAR: "./monocyte_ar.glb",    usdz: "./monocyte.usdz" },
          { key: "lymphocyte", label: "Lymphocyte", glb3d: "./lymphocyte.glb",  glbAR: "./lymphocyte_ar.glb",  usdz: "./lymphocyte.usdz" },
        ];

        const HOTSPOT_PRESETS = {
          neutrophil: {
            "hotspot-nucleus": [-1.300,  2.000, -2.200],
            "hotspot-golgi":   [ 0.900,  0.600, -0.100],
            "hotspot-mito":    [ 3.600,  0.200, -3.600],
            "hotspot-ribosome":[ 2.300, -0.200, -4.300],
            "hotspot-granules":[-2.900, -1.600,  5.800],
          },
          basophil: {
            "hotspot-nucleus": [-1.300, 2.000, -2.200],
            "hotspot-golgi":   [ 0.900, 0.600, -0.100],
            "hotspot-mito":    [ 3.600, 0.200, -3.600],
            "hotspot-ribosome":[ 3.800, 0.700, -7.100],
            "hotspot-granules":[-4.200, 1.600,  3.900],
          },
          eosinophil: {
            "hotspot-nucleus": [-1.300, 2.000, -2.200],
            "hotspot-golgi":   [ 0.900, 0.600, -0.100],
            "hotspot-mito":    [ 3.600, 0.200, -3.600],
            "hotspot-ribosome":[ 4.700,-2.400, -0.600],
            "hotspot-granules":[-2.900,-1.600,  5.800],
          },
          monocyte: {
            "hotspot-nucleus": [-1.300, 2.000, -2.200],
            "hotspot-golgi":   [ 0.900, 0.600, -0.100],
            "hotspot-mito":    [ 3.600, 0.200, -3.600],
            "hotspot-ribosome":[ 5.100,-0.800, -3.100],
            "hotspot-granules":[-3.400,-1.800,  6.400],
          },
          lymphocyte: {
            "hotspot-nucleus": [-1.300, 2.000, -2.200],
            "hotspot-golgi":   [-0.200, 1.900, -6.200],
            "hotspot-mito":    [ 3.500,-0.100, -5.600],
            "hotspot-ribosome":[ 3.500,-2.100, -6.500],
          },
        };

        let activeKey = null;

        function setError(msg) {
          if (!msg) { errorbox.style.display = "none"; errorbox.textContent = ""; return; }
          errorbox.style.display = "block";
          errorbox.textContent = msg;
        }

        function setHotspotPosition(hotspotId, x, y, z) {
          const el = document.getElementById(hotspotId);
          if (!el) return;
          const slotName = el.getAttribute("slot");
          const posString = `${x.toFixed(3)} ${y.toFixed(3)} ${z.toFixed(3)}`;
          el.setAttribute("data-position", posString);
          if (typeof viewer3d.updateHotspot === "function" && slotName) {
            viewer3d.updateHotspot({ name: slotName, position: posString });
          }
        }

        function applyHotspotPresetFor(key) {
          const preset = HOTSPOT_PRESETS[key];
          if (!preset) return;
          Object.entries(preset).forEach(([hotspotId, xyz]) => {
            setHotspotPosition(hotspotId, xyz[0], xyz[1], xyz[2]);
          });
        }

        function renderModelMenu() {
          modelMenu.innerHTML = MODELS.map(m => {
            const cls = m.key === activeKey ? "model-btn active" : "model-btn";
            return `<button class="${cls}" type="button" data-model="${m.key}">${m.label}</button>`;
          }).join("");

          modelMenu.querySelectorAll("button[data-model]").forEach(btn => {
            btn.addEventListener("click", () => selectModel(btn.getAttribute("data-model")));
          });
        }

        function selectModel(key) {
          const m = MODELS.find(x => x.key === key);
          if (!m) return;

          setError(null);
          activeKey = key;

          landing.style.display = "none";
          topbar.style.display = "flex";
          viewer3d.style.display = "block";
          enterAR.style.display = "block";
          renderModelMenu();

          // 3D viewer always uses glb3d so hotspots stay aligned.
          viewer3d.removeAttribute("src");
          requestAnimationFrame(() => viewer3d.setAttribute("src", m.glb3d));

          // AR launcher uses glbAR if present, otherwise glb3d.
          const arSrc = m.glbAR || m.glb3d;
          viewerAR.removeAttribute("src");
          requestAnimationFrame(() => viewerAR.setAttribute("src", arSrc));

          // iOS kept here in case you later re-enable quick-look; scene-viewer is Android.
          viewerAR.removeAttribute("ios-src");
          if (isIOS && m.usdz) viewerAR.setAttribute("ios-src", m.usdz);

          // Apply hotspot preset after 3D model loads.
          viewer3d.addEventListener("load", () => {
            applyHotspotPresetFor(activeKey);
          }, { once: true });

          // Basic load error reporting
          viewer3d.addEventListener("error", (ev) => {
            const detail = ev?.detail ? JSON.stringify(ev.detail) : "";
            setError(`3D model failed to load.\n${m.label}\n${m.glb3d}\n${detail}`);
          }, { once: true });
          viewerAR.addEventListener("error", (ev) => {
            const detail = ev?.detail ? JSON.stringify(ev.detail) : "";
            setError(`AR model failed to load.\n${m.label}\n${arSrc}\n${detail}`);
          }, { once: true });
        }

        function buildLanding() {
          landingGrid.innerHTML = MODELS.map(m => `
            <button class="pick" type="button" data-model="${m.key}">${m.label}</button>
          `).join("");

          landingGrid.querySelectorAll("button[data-model]").forEach(btn => {
            btn.addEventListener("click", () => selectModel(btn.getAttribute("data-model")));
          });
        }

        // Launch Scene Viewer AR with an AR-only scale attempt.
        // If your device/version ignores runtime transform, use *_ar.glb files above.
        enterAR.addEventListener("click", async () => {
          if (!activeKey) return;
          const m = MODELS.find(x => x.key === activeKey);
          if (!m) return;

          // Force AR-only scale on the AR launcher element right before handoff
          const s = `${AR_SCALE} ${AR_SCALE} ${AR_SCALE}`;
          viewerAR.setAttribute("scale", s);

          // Ensure AR launcher is pointing at the AR src (in case you changed models)
          const arSrc = m.glbAR || m.glb3d;
          if (viewerAR.getAttribute("src") !== arSrc) viewerAR.setAttribute("src", arSrc);

          try {
            await viewerAR.activateAR();
          } catch (e) {
            setError(`AR failed to launch.\n${String(e)}`);
          } finally {
            // Reset AR launcher transform so it never affects your 3D hotspot alignment.
            viewerAR.removeAttribute("scale");
          }
        });

        // Initial state
        buildLanding();
      });
    </script>
  </body>
</html>
