<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <script type="module" src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js"></script>
    <style>
      html,body{margin:0;height:100%;touch-action:none;overscroll-behavior:none;}
      model-viewer{width:100vw;height:100vh;touch-action:none;}
    </style>
  </head>
  <body>
    <model-viewer
      ar
      ar-modes="webxr"
      ar-placement="floor"
      ar-scale="auto"
      touch-action="none"
      src="./neutrophil.glb">
    </model-viewer>
  </body>
</html>
